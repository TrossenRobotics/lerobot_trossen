[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lerobot_teleoperator_trossen"
version = "0.1.0"
description = "Trossen Robotics LeRobot integration - Teleoperators"
authors = [{ name = "Trossen Robotics" }]
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = ["lerobot[intelrealsense]>=0.5.1", "trossen_arm>=1.9.0"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["lerobot_teleoperator_trossen"]
